<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Converge — Campus Research Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080C14;
      --surface:      #0F1623;
      --border:       rgba(255,255,255,0.06);
      --accent:       #4F8EF7;
      --accent-glow:  rgba(79,142,247,0.25);
      --success:      #22C55E;
      --danger:       #EF4444;
      --warning:      #F59E0B;
      --text:         #F0F4FF;
      --muted:        #6B7A99;
      --radius-card:  16px;
      --radius-btn:   10px;
      --radius-pill:  999px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Ambient blobs */
    .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0.18; filter: blur(90px); }
    .blob-1 { width: 520px; height: 520px; top: -160px; left: -160px; background: radial-gradient(circle, #3B6FD4 0%, #1a3a8f 60%, transparent 100%); animation: blobDrift1 14s ease-in-out infinite alternate; }
    .blob-2 { width: 480px; height: 480px; bottom: -140px; right: -140px; background: radial-gradient(circle, #7C3AED 0%, #4c1d95 60%, transparent 100%); animation: blobDrift2 16s ease-in-out infinite alternate; }
    @keyframes blobDrift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.08); } }
    @keyframes blobDrift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-30px,-40px) scale(1.06); } }

    .page-center { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }

    /* Compact Card Resizing */
    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(15,22,35,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 28px 32px;
      box-shadow: 0 0 0 0 var(--accent-glow);
      transition: box-shadow 0.35s ease;
    }
    .card:hover { box-shadow: 0 0 48px 0 var(--accent-glow); }

    .brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 4px; }
    .brand-logo { flex-shrink: 0; width: 28px; height: 28px; }
    .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #F0F4FF 0%, #4F8EF7 100%); background-clip: text; -webkit-text-fill-color: transparent; }
    .brand-tagline { text-align: center; font-size: 11.5px; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 20px; }

    .tab-switcher { position: relative; display: flex; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 4px; margin-bottom: 20px; }
    .tab-indicator { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: var(--accent); border-radius: var(--radius-pill); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 16px var(--accent-glow); z-index: 0; }
    .tab-indicator.on-register { transform: translateX(100%); }
    .tab-btn { position: relative; z-index: 1; flex: 1; background: transparent; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); padding: 6px 0; border-radius: var(--radius-pill); transition: color 0.2s ease; }
    .tab-btn.active { color: #fff; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* CSS Grid for side-by-side inputs */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-row .form-group { margin-bottom: 0; }
    
    .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: all 0.2s ease; }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.15); }
    .input-wrap input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }
    
    .field-error { font-size: 11px; color: var(--danger); margin-top: 4px; display: none; }
    .field-error.show { display: block; }
    .pw-toggle { position: absolute; right: 10px; background: none; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; padding: 0; }
    .pw-toggle:hover { color: var(--text); }

    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .toggle-label { font-size: 12.5px; color: var(--muted); cursor: pointer; user-select: none; }
    .toggle-switch { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: rgba(255,255,255,0.08); border-radius: 999px; cursor: pointer; transition: background 0.2s; border: 1px solid var(--border); }
    .toggle-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: var(--muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .toggle-switch input:checked + .toggle-track { background: rgba(79,142,247,0.25); border-color: var(--accent); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(14px); background: var(--accent); }

    .btn-primary { width: 100%; padding: 11px; background: var(--accent); border: none; border-radius: var(--radius-btn); font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 700; color: #fff; cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover:not(:disabled) { background: #6BA3F9; box-shadow: 0 0 24px rgba(79,142,247,0.45); }
    .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .btn-spinner.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .role-card { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s ease; }
    .role-card.selected { border-color: var(--accent); background: rgba(79,142,247,0.12); box-shadow: 0 0 14px rgba(79,142,247,0.2); }
    .role-card svg { opacity: 0.7; width: 22px; height: 22px; }
    .role-card.selected svg { opacity: 1; }
    .role-card span { font-size: 12px; font-weight: 600; color: var(--muted); }
    .role-card.selected span { color: var(--text); }

    .dept-wrap { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s; opacity: 0; }
    .dept-wrap.show { max-height: 70px; opacity: 1; }

    .pw-strength { margin-top: 6px; }
    .pw-strength-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
    .pw-strength-fill { height: 100%; width: 0%; border-radius: 999px; transition: width 0.3s ease, background 0.3s ease; }
    .pw-strength-label { font-size: 10.5px; color: var(--muted); margin-top: 4px; }

    #toast-container { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
    .toast { pointer-events: auto; display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.5); white-space: nowrap; animation: toastIn 0.35s forwards; }
    .toast.out { animation: toastOut 0.3s ease forwards; }
    .toast.success { border-left: 3px solid var(--success); } .toast.error { border-left: 3px solid var(--danger); }
    @keyframes toastIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform: translateY(0); } to { opacity:0; transform: translateY(-12px); } }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div id="toast-container"></div>

  <div class="page-center">
    <div class="card">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="17" r="9" fill="none" stroke="#4F8EF7" stroke-width="2" opacity="0.9"/>
          <circle cx="22" cy="17" r="9" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.9"/>
          <circle cx="5"  cy="17" r="2" fill="#4F8EF7"/>
          <circle cx="17" cy="10" r="2" fill="#8B6EF7"/>
          <circle cx="17" cy="24" r="2" fill="#8B6EF7"/>
          <circle cx="29" cy="17" r="2" fill="#7C3AED"/>
        </svg>
        <span class="brand-name">Converge</span>
      </div>
      <p class="brand-tagline">Campus Research Collaboration Network</p>

      <div class="tab-switcher" role="tablist">
        <div class="tab-indicator" id="tab-indicator"></div>
        <button class="tab-btn active" id="tab-signin" role="tab" aria-selected="true" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" id="tab-register" role="tab" aria-selected="false" onclick="switchTab('register')">Register</button>
      </div>

      <!-- SIGN IN PANEL -->
      <div class="tab-panel active" id="panel-signin">
        <div class="form-group">
          <label class="form-label" for="si-email">Email Address</label>
          <div class="input-wrap"><input type="email" id="si-email" placeholder="you@university.edu" autocomplete="email" /></div>
          <div class="field-error" id="si-email-err">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="si-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="si-password" placeholder="••••••••" autocomplete="current-password" style="padding-right:36px" />
            <button class="pw-toggle" type="button" onclick="togglePassword('si-password', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="si-pw-err">Please enter your password.</div>
        </div>
        <div class="toggle-row">
          <label class="toggle-switch"><input type="checkbox" id="si-remember" /><span class="toggle-track"></span></label>
          <label class="toggle-label" for="si-remember">Remember me</label>
        </div>
        <button class="btn-primary" id="si-submit-btn" onclick="handleSignIn()">
          <div class="btn-spinner" id="si-spinner"></div><span id="si-btn-text">Sign In</span>
        </button>
      </div>

      <!-- REGISTER PANEL -->
      <div class="tab-panel" id="panel-register">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="rg-name">Full Name</label>
            <div class="input-wrap"><input type="text" id="rg-name" placeholder="Jane Smith" autocomplete="name" /></div>
            <div class="field-error" id="rg-name-err">Required.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="rg-email">Email Address</label>
            <div class="input-wrap"><input type="email" id="rg-email" placeholder="you@university.edu" autocomplete="email" /></div>
            <div class="field-error" id="rg-email-err">Invalid email.</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="rg-password">Password</label>
            <div class="input-wrap">
              <input type="password" id="rg-password" placeholder="Create password" autocomplete="new-password" style="padding-right:36px" oninput="updateStrength(this.value)" />
              <button class="pw-toggle" type="button" onclick="togglePassword('rg-password', this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
            <div class="field-error" id="rg-pw-err">Too weak.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="rg-confirm">Confirm</label>
            <div class="input-wrap">
              <input type="password" id="rg-confirm" placeholder="Repeat password" autocomplete="new-password" style="padding-right:36px" />
              <button class="pw-toggle" type="button" onclick="togglePassword('rg-confirm', this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
            <div class="field-error" id="rg-confirm-err">Mismatch.</div>
          </div>
        </div>
        
        <div class="pw-strength" style="margin-top:-6px; margin-bottom: 12px;">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-fill"></div></div>
          <div class="pw-strength-label" id="pw-label">Enter a password</div>
        </div>

        <div class="form-group">
          <div class="form-label">Role</div>
          <div class="role-selector">
            <div class="role-card selected" id="role-student" onclick="selectRole('student')">
              <svg viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3.333 2 8.667 2 12 0v-5"/></svg>
              <span>Student</span>
            </div>
            <div class="role-card" id="role-faculty" onclick="selectRole('faculty')">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
              <span>Faculty</span>
            </div>
          </div>
          <input type="hidden" id="rg-role" value="student" />
        </div>

        <div class="dept-wrap" id="dept-wrap">
          <div class="form-group">
            <label class="form-label" for="rg-dept">Department</label>
            <div class="input-wrap"><input type="text" id="rg-dept" placeholder="e.g. Computer Science" /></div>
          </div>
        </div>

        <button class="btn-primary" id="rg-submit-btn" onclick="handleRegister()">
          <div class="btn-spinner" id="rg-spinner"></div><span id="rg-btn-text">Create Account</span>
        </button>
      </div>

    </div>
  </div>

  <script>
    let currentTab = 'signin';
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('panel-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('panel-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-indicator').classList.toggle('on-register', tab === 'register');
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'text' ? 'password' : 'text';
    }

    let pwStrengthLevel = 0;
    function updateStrength(val) {
      const fill = document.getElementById('pw-fill'), label = document.getElementById('pw-label');
      if (!val) { fill.style.width = '0%'; fill.style.background = ''; label.textContent = 'Enter a password'; pwStrengthLevel = 0; return; }
      let score = (val.length >= 8 ? 1 : 0) + (/[A-Z]/.test(val) ? 1 : 0) + (/[0-9]/.test(val) ? 1 : 0) + (/[^A-Za-z0-9]/.test(val) ? 1 : 0);
      if (score <= 1) { fill.style.width='33%'; fill.style.background='#EF4444'; label.textContent='Weak'; pwStrengthLevel=1; }
      else if (score <= 2) { fill.style.width='66%'; fill.style.background='#F59E0B'; label.textContent='Moderate'; pwStrengthLevel=2; }
      else { fill.style.width='100%'; fill.style.background='#22C55E'; label.textContent='Strong'; pwStrengthLevel=3; }
    }

    function selectRole(role) {
      document.getElementById('rg-role').value = role;
      document.getElementById('role-student').classList.toggle('selected', role === 'student');
      document.getElementById('role-faculty').classList.toggle('selected', role === 'faculty');
      document.getElementById('dept-wrap').classList.toggle('show', role === 'faculty');
    }

    function setError(inputId, errId, show, msg) {
      const input = document.getElementById(inputId), err = document.getElementById(errId);
      if (show) { input.classList.add('error'); err.textContent = msg || err.textContent; err.classList.add('show'); } 
      else { input.classList.remove('error'); err.classList.remove('show'); }
    }
    function clearErrors(...ids) { ids.forEach(id => document.getElementById(id)?.classList.remove('error')); document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show')); }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container'), toast = document.createElement('div');
      toast.className = `toast ${type}`; toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast); setTimeout(() => { toast.classList.add('out'); setTimeout(() => toast.remove(), 320); }, 3500);
    }

    function setLoading(btnId, spinnerId, textId, loading, label = 'Loading…') {
      const btn = document.getElementById(btnId), sp = document.getElementById(spinnerId), txt = document.getElementById(textId);
      btn.disabled = loading; sp.classList.toggle('show', loading); txt.textContent = loading ? label : txt.dataset.default || txt.textContent;
    }

    async function handleSignIn() {
      clearErrors('si-email', 'si-password');
      const email = document.getElementById('si-email').value.trim(), pw = document.getElementById('si-password').value;
      if (!email || !pw) return showToast('Fill all fields.', 'error');
      setLoading('si-submit-btn', 'si-spinner', 'si-btn-text', true, 'Signing in…');
      try {
        const fd = new FormData(); fd.append('email', email); fd.append('password', pw); fd.append('remember', document.getElementById('si-remember').checked ? '1' : '0');
        const res = await fetch('../backend/login_process.php', { method: 'POST', body: fd, credentials: 'include' });
        const data = await res.json();
        if (data.status === 'success') { showToast('Welcome back!', 'success'); setTimeout(() => window.location.href = 'dashboard.html', 900); } 
        else showToast(data.message, 'error');
      } catch (err) { showToast('Network error.', 'error'); } 
      finally { setLoading('si-submit-btn', 'si-spinner', 'si-btn-text', false); document.getElementById('si-btn-text').textContent = 'Sign In'; }
    }

    async function handleRegister() {
      clearErrors('rg-name','rg-email','rg-password','rg-confirm');
      const name = document.getElementById('rg-name').value.trim(), email = document.getElementById('rg-email').value.trim(), pw = document.getElementById('rg-password').value, confirm = document.getElementById('rg-confirm').value, role = document.getElementById('rg-role').value;
      if (!name || !email || pw !== confirm || pwStrengthLevel < 2) return showToast('Please check all fields.', 'error');
      setLoading('rg-submit-btn', 'rg-spinner', 'rg-btn-text', true, 'Creating…');
      try {
        const fd = new FormData(); fd.append('name', name); fd.append('email', email); fd.append('password', pw); fd.append('role', role); if(role==='faculty') fd.append('department', document.getElementById('rg-dept').value.trim());
        const res = await fetch('../backend/register_process.php', { method: 'POST', body: fd, credentials: 'include' });
        const data = await res.json();
        if (data.status === 'success') { showToast('Account created!', 'success'); setTimeout(() => switchTab('signin'), 1200); } 
        else showToast(data.message, 'error');
      } catch (err) { showToast('Network error.', 'error'); } 
      finally { setLoading('rg-submit-btn', 'rg-spinner', 'rg-btn-text', false); document.getElementById('rg-btn-text').textContent = 'Create Account'; }
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') { currentTab === 'signin' ? handleSignIn() : handleRegister(); } });
  </script>
</body>
</html>
