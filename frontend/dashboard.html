<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Converge — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS & RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080C14;
      --surface:      #0F1623;
      --surface-2:    #111827;
      --border:       rgba(255,255,255,0.06);
      --border-hover: rgba(79,142,247,0.35);
      --accent:       #4F8EF7;
      --accent-glow:  rgba(79,142,247,0.22);
      --success:      #22C55E;
      --danger:       #EF4444;
      --warning:      #F59E0B;
      --text:         #F0F4FF;
      --muted:        #6B7A99;
      --radius-card:  16px;
      --radius-btn:   10px;
      --radius-pill:  999px;
      --navbar-h:     60px;
      --sidebar-w:    340px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ============================================================
       SCROLLBAR
    ============================================================ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

    /* ============================================================
       TOP NAVBAR
    ============================================================ */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--navbar-h);
      z-index: 100;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }
    .nav-brand-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.4px;
      background: linear-gradient(135deg, #F0F4FF 0%, #4F8EF7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-tagline {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
    .role-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }
    .role-pill.faculty {
      background: rgba(124,58,237,0.1);
      border-color: rgba(124,58,237,0.3);
      color: #a78bfa;
    }
    .role-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .role-pill.faculty .role-dot { background: #a78bfa; box-shadow: 0 0 8px #7C3AED; }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .nav-username {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .btn-disconnect {
      padding: 7px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-btn);
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: #EF4444;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-disconnect:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.5);
    }

    /* ============================================================
       PAGE LAYOUT
    ============================================================ */
    .page-body {
      padding-top: var(--navbar-h);
      min-height: 100vh;
    }
    .page-grid {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      gap: 24px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px;
      align-items: start;
    }

    /* ============================================================
       CARDS / SURFACES
    ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 22px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ============================================================
       SEARCH BAR
    ============================================================ */
    .search-wrap {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 4px 4px 4px 16px;
      margin-bottom: 24px;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }
    .search-icon { color: var(--muted); flex-shrink: 0; display: flex; align-items: center; }
    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
    }
    .search-input::placeholder { color: var(--muted); }
    .btn-query {
      padding: 9px 20px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-query:hover { background: #6BA3F9; box-shadow: 0 0 16px var(--accent-glow); }

    /* ============================================================
       PROJECT CARDS GRID
    ============================================================ */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: all 0.22s ease;
      position: relative;
    }
    .project-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 8px 32px rgba(79,142,247,0.12);
    }
    .project-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .project-title {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .status-badge {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .status-badge.approved {
      background: rgba(34,197,94,0.12);
      color: var(--success);
      border: 1px solid rgba(34,197,94,0.25);
      box-shadow: 0 0 10px rgba(34,197,94,0.1);
    }
    .project-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      position: relative;
    }
    .tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-pill {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 11.5px;
      font-weight: 600;
    }
    /* Tag color variants */
    .tag-v0 { background: rgba(79,142,247,0.12); color: #7ab3ff; border: 1px solid rgba(79,142,247,0.2); }
    .tag-v1 { background: rgba(124,58,237,0.12); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.2); }
    .tag-v2 { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
    .tag-v3 { background: rgba(34,197,94,0.12);  color: #86efac; border: 1px solid rgba(34,197,94,0.2);  }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }
    .member-chip {
      font-size: 12.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-join {
      padding: 7px 16px;
      background: rgba(79,142,247,0.12);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: var(--radius-pill);
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-join:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .btn-join.joined {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.25);
      color: var(--success);
      cursor: default;
    }
    .btn-join:disabled { cursor: default; }

    /* ============================================================
       SKELETON LOADERS
    ============================================================ */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sk-line { height: 12px; }
    .sk-line.short { width: 45%; }
    .sk-line.long  { width: 85%; }
    .sk-line.medium { width: 65%; }
    .sk-block { height: 60px; }

    /* ============================================================
       PAGINATION
    ============================================================ */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
    }
    .page-btn {
      min-width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0 10px;
    }
    .page-btn:hover:not(:disabled):not(.active) {
      border-color: var(--border-hover);
      color: var(--text);
    }
    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 14px var(--accent-glow);
    }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 60px 20px;
      grid-column: 1 / -1;
    }
    .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text); }
    .empty-state p  { font-size: 13px; color: var(--muted); text-align: center; max-width: 280px; line-height: 1.6; }

    /* ============================================================
       DETAILS MODAL
    ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal {
      background: var(--surface);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 20px;
      width: 100%;
      max-width: 560px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      animation: modalIn 0.25s cubic-bezier(0.34,1.2,0.64,1);
      position: relative;
    }
    @keyframes modalIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .modal-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 12px; padding-right: 40px; }
    .modal-desc  { font-size: 13.5px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
    .modal-meta  { font-size: 12.5px; color: var(--muted); }
    .modal-meta strong { color: var(--text); }
    .modal-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 16px 0 8px; }
    .collaborator-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .collaborator-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text);
    }
    .collaborator-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(79,142,247,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--accent);
    }

    /* ============================================================
       SIDEBAR — PROPOSAL SUBMISSION
    ============================================================ */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .accent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-card);
      padding: 20px;
    }
    .accent-card.warning { border-left-color: var(--warning); }

    .form-input, .form-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 10px;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }
    .form-textarea { resize: vertical; min-height: 80px; }

    .btn-submit-proposal {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-btn);
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: relative; overflow: hidden;
    }
    .btn-submit-proposal::before {
      content: '';
      position: absolute; top:0; left:-100%;
      width:60%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left 0.4s ease;
    }
    .btn-submit-proposal:hover:not(:disabled)::before { left: 140%; }
    .btn-submit-proposal:hover:not(:disabled) {
      background: #6BA3F9;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-submit-proposal:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-spinner-sm {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-spinner-sm.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       MODERATION QUEUE (Faculty)
    ============================================================ */
    .pending-list { display: flex; flex-direction: column; gap: 10px; }
    .pending-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-left: 3px solid var(--warning);
      border-radius: 12px;
      padding: 12px 14px;
      transition: all 0.35s ease;
    }
    .pending-item.removing {
      opacity: 0;
      transform: scaleY(0);
      transform-origin: top;
      max-height: 0;
      padding: 0;
      margin: 0;
      border: none;
    }
    .pending-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .pending-meta  { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
    .pending-actions { display: flex; gap: 8px; }
    .btn-authorize, .btn-reject {
      flex: 1;
      padding: 7px;
      border: 1px solid;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-authorize {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.25);
      color: var(--success);
    }
    .btn-authorize:hover { background: rgba(34,197,94,0.2); border-color: var(--success); }
    .btn-reject {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.25);
      color: var(--danger);
    }
    .btn-reject:hover { background: rgba(239,68,68,0.2); border-color: var(--danger); }

    .all-clear {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 0 8px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ============================================================
       ACCOUNT SUMMARY CARD
    ============================================================ */
    .account-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 18px;
    }
    .account-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .account-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(79,142,247,0.3), rgba(124,58,237,0.3));
      border: 1px solid rgba(79,142,247,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; color: var(--accent);
      flex-shrink: 0;
    }
    .account-info { flex: 1; min-width: 0; }
    .account-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .account-email { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .account-role-badge {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 700;
    }
    .account-role-badge.student { background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
    .account-role-badge.faculty { background: rgba(124,58,237,0.1); color: #a78bfa; border: 1px solid rgba(124,58,237,0.2); }

    /* ============================================================
       TOAST SYSTEM (bottom-right, stackable)
    ============================================================ */
    #toast-container {
      position: fixed;
      bottom: 28px; right: 28px;
      z-index: 9999;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      min-width: 260px;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow: hidden;
      animation: toastSlideIn 0.3s cubic-bezier(0.34,1.2,0.64,1) forwards;
    }
    .toast.out { animation: toastSlideOut 0.28s ease forwards; }
    @keyframes toastSlideIn  { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }
    @keyframes toastSlideOut { from { opacity:1; transform: translateX(0); }    to { opacity:0; transform: translateX(30px); } }
    .toast-body {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px 10px;
    }
    .toast-icon { flex-shrink: 0; margin-top: 1px; }
    .toast-msg  { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5; }
    .toast-progress {
      height: 3px;
      width: 100%;
      border-radius: 0;
    }
    .toast.success .toast-progress { background: var(--success); }
    .toast.error   .toast-progress { background: var(--danger); }
    .toast.info    .toast-progress { background: var(--accent); }
    .toast-progress-inner {
      height: 100%;
      width: 100%;
      animation: shrink 3.5s linear forwards;
    }
    .toast.success .toast-progress-inner { background: var(--success); opacity: 0.6; }
    .toast.error   .toast-progress-inner { background: var(--danger); opacity: 0.6; }
    .toast.info    .toast-progress-inner { background: var(--accent); opacity: 0.6; }
    @keyframes shrink { from { width:100%; } to { width:0%; } }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 900px) {
      .page-grid { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      .nav-tagline { display: none; }
    }
    @media (max-width: 600px) {
      .nav-username { display: none; }
      .navbar { padding: 0 14px; }
      .page-grid { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- ====================== TOAST CONTAINER ====================== -->
  <div id="toast-container"></div>

  <!-- ====================== DETAILS MODAL ====================== -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal-box">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="modal-title" id="modal-title">Project Title</h2>
      <div class="tags-row" id="modal-tags" style="margin-bottom:16px"></div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-section-title">Project Details</div>
      <div class="modal-meta">
        <div><strong>Submitted:</strong> <span id="modal-date"></span></div>
        <div style="margin-top:4px"><strong>Approved by:</strong> <span id="modal-faculty"></span></div>
      </div>
      <div class="modal-section-title">Collaborators</div>
      <ul class="collaborator-list" id="modal-collaborators"></ul>
    </div>
  </div>

  <!-- ====================== NAVBAR ====================== -->
  <nav class="navbar">
    <a class="nav-brand" href="#">
      <svg width="30" height="30" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="17" r="9" fill="none" stroke="#4F8EF7" stroke-width="2" opacity="0.9"/>
        <circle cx="22" cy="17" r="9" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.9"/>
        <circle cx="5"  cy="17" r="2" fill="#4F8EF7"/>
        <circle cx="17" cy="10" r="2" fill="#8B6EF7"/>
        <circle cx="17" cy="24" r="2" fill="#8B6EF7"/>
        <circle cx="29" cy="17" r="2" fill="#7C3AED"/>
      </svg>
      <span class="nav-brand-name">Converge</span>
    </a>
    <div class="nav-tagline">Research Network</div>
    <div class="nav-right">
      <div class="role-pill" id="nav-role-pill">
        <div class="role-dot"></div>
        <span id="nav-role-label">—</span>
      </div>
      <span class="nav-username" id="nav-username">—</span>
      <button class="btn-disconnect" onclick="handleLogout()">Disconnect</button>
    </div>
  </nav>

  <!-- ====================== PAGE BODY ====================== -->
  <div class="page-body">
    <div class="page-grid">

      <!-- ============= MAIN FEED ============= -->
      <main>
        <!-- Search -->
        <div class="search-wrap">
          <div class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <input type="text" class="search-input" id="search-input" placeholder="Search projects by title, tag, or description…" onkeydown="if(event.key==='Enter') handleSearch()" />
          <button class="btn-query" onclick="handleSearch()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Query
          </button>
        </div>

        <!-- Project grid -->
        <div class="projects-grid" id="projects-grid">
          <!-- Skeleton loaders -->
          <div class="skeleton-card">
            <div class="skeleton sk-line short"></div>
            <div class="skeleton sk-block"></div>
            <div class="skeleton sk-line long"></div>
            <div class="skeleton sk-line medium"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton sk-line short"></div>
            <div class="skeleton sk-block"></div>
            <div class="skeleton sk-line long"></div>
            <div class="skeleton sk-line medium"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton sk-line short"></div>
            <div class="skeleton sk-block"></div>
            <div class="skeleton sk-line long"></div>
            <div class="skeleton sk-line medium"></div>
          </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
      </main>

      <!-- ============= SIDEBAR ============= -->
      <aside class="sidebar">

        <!-- Proposal Submission -->
        <div class="accent-card">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Submit Proposal
          </div>
          <input type="text" class="form-input" id="prop-title" placeholder="Project title…" />
          <textarea class="form-textarea" id="prop-desc" placeholder="Describe your research idea…"></textarea>
          <input type="text" class="form-input" id="prop-tags" placeholder="Tags: e.g. AI, IoT, Robotics" />
          <button class="btn-submit-proposal" id="prop-submit-btn" onclick="handleProposalSubmit()">
            <div class="btn-spinner-sm" id="prop-spinner"></div>
            <span id="prop-btn-text">Submit Proposal</span>
          </button>
        </div>

        <!-- Moderation Queue — injected if faculty -->
        <div id="moderation-card" style="display:none">
          <div class="accent-card warning">
            <div class="card-title" style="color:var(--warning)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              Moderation Queue
            </div>
            <div class="pending-list" id="pending-list">
              <!-- populated by JS -->
            </div>
          </div>
        </div>

        <!-- Account Summary -->
        <div class="account-card">
          <div class="account-row">
            <div class="account-avatar" id="account-avatar">?</div>
            <div class="account-info">
              <div class="account-name" id="account-name">—</div>
              <div class="account-email" id="account-email">—</div>
              <div class="account-role-badge student" id="account-role-badge">—</div>
            </div>
          </div>
        </div>

      </aside>
    </div>
  </div>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
  /* ============================================================
     STATE
  ============================================================ */
  let currentUser = { name: '', email: '', role: '' };
  let allProjects  = [];
  let filteredProjects = [];
  const PAGE_SIZE = 6;
  let currentPage = 1;

  /* ============================================================
     TOAST SYSTEM
  ============================================================ */
  function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const icons = {
      success: `<svg class="toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      error:   `<svg class="toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      info:    `<svg class="toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
      <div class="toast-body">${icons[type]||icons.info}<span class="toast-msg">${message}</span></div>
      <div class="toast-progress"><div class="toast-progress-inner"></div></div>
    `;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('out');
      setTimeout(() => toast.remove(), 300);
    }, 3500);
  }

  /* ============================================================
     AUTH CHECK — runs on page load
  ============================================================ */
  async function init() {
    try {
      const res  = await fetch('../backend/auth_check.php', { credentials: 'include' });
      const data = await res.json();
      if (data.status !== 'success') {
        window.location.href = 'login.html';
        return;
      }
      // Store user info
      currentUser.name  = data.data?.name  || 'Unknown User';
      currentUser.email = data.data?.email || '';
      currentUser.role  = data.data?.role  || 'student';

      applyUserUI();
      loadProjects();
      if (currentUser.role === 'faculty') loadPendingQueue();
    } catch (err) {
      showToast('Connection error. Please try again.', 'error');
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    }
  }

  /* ============================================================
     APPLY USER INFO TO UI
  ============================================================ */
  function applyUserUI() {
    const { name, email, role } = currentUser;

    // Navbar
    document.getElementById('nav-username').textContent = name;
    const rolePill  = document.getElementById('nav-role-pill');
    const roleLabel = document.getElementById('nav-role-label');
    roleLabel.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    if (role === 'faculty') rolePill.classList.add('faculty');

    // Account summary card
    document.getElementById('account-avatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('account-name').textContent   = name;
    document.getElementById('account-email').textContent  = email;
    const badge = document.getElementById('account-role-badge');
    badge.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    badge.className = `account-role-badge ${role}`;

    // Show moderation card for faculty
    if (role === 'faculty') document.getElementById('moderation-card').style.display = 'block';
  }

  /* ============================================================
     LOGOUT
  ============================================================ */
  async function handleLogout() {
    try {
      await fetch('../backend/logout.php', { credentials: 'include' });
    } catch (_) { /* proceed anyway */ }
    window.location.href = 'login.html';
  }

  /* ============================================================
     LOAD PROJECTS
  ============================================================ */
  async function loadProjects() {
    try {
      const res  = await fetch('../backend/get_projects.php', { credentials: 'include' });
      const data = await res.json();
      if (data.status === 'success') {
        allProjects = data.data || [];
        filteredProjects = [...allProjects];
        currentPage = 1;
        renderProjects();
      } else {
        showToast(data.message || 'Failed to load projects.', 'error');
        document.getElementById('projects-grid').innerHTML = emptyStateHTML('Failed to load projects', 'Server returned an error. Please refresh and try again.');
      }
    } catch (err) {
      showToast('Network error loading projects.', 'error');
      document.getElementById('projects-grid').innerHTML = emptyStateHTML('Connection error', 'Could not reach the server. Check your connection.');
    }
  }

  /* ============================================================
     RENDER PROJECTS (with pagination)
  ============================================================ */
  function renderProjects() {
    const grid = document.getElementById('projects-grid');
    const totalPages = Math.ceil(filteredProjects.length / PAGE_SIZE);
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filteredProjects.slice(start, start + PAGE_SIZE);

    if (filteredProjects.length === 0) {
      grid.innerHTML = emptyStateHTML('No projects found', 'No research projects match your query. Try a different search term.');
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = page.map(p => projectCardHTML(p)).join('');
    renderPagination(totalPages);
  }

  /* ============================================================
     PROJECT CARD HTML
  ============================================================ */
  const TAG_VARIANTS = ['tag-v0', 'tag-v1', 'tag-v2', 'tag-v3'];

  function projectCardHTML(p) {
    const tags = (p.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    const tagPills = tags.map((t, i) => `<span class="tag-pill ${TAG_VARIANTS[i % 4]}">${escapeHTML(t)}</span>`).join('');
    const collabs   = p.collaborators || [];
    const memberCount = collabs.length;
    const joined    = collabs.some(c => (c.email || c.id) === currentUser.email);
    const joinBtn   = joined
      ? `<button class="btn-join joined" disabled>✓ Joined</button>`
      : `<button class="btn-join" onclick="handleJoin(event, '${p.id}', this)">Join Team</button>`;

    return `
      <div class="project-card" onclick="openModal('${p.id}')">
        <div class="project-card-header">
          <div class="project-title">${escapeHTML(p.title || 'Untitled Project')}</div>
          <span class="status-badge approved">Approved</span>
        </div>
        <p class="project-desc">${escapeHTML(p.description || '')}</p>
        <div class="tags-row">${tagPills}</div>
        <div class="card-footer">
          <div class="member-chip">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span id="member-count-${p.id}">${memberCount}</span> members
          </div>
          ${joinBtn}
        </div>
      </div>
    `;
  }

  /* ============================================================
     PAGINATION RENDER
  ============================================================ */
  function renderPagination(totalPages) {
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next →</button>`;
    pg.innerHTML = html;
  }

  function goPage(n) {
    const totalPages = Math.ceil(filteredProjects.length / PAGE_SIZE);
    if (n < 1 || n > totalPages) return;
    currentPage = n;
    renderProjects();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ============================================================
     SEARCH
  ============================================================ */
  async function handleSearch() {
    const query = document.getElementById('search-input').value.trim();

    if (!query) {
      filteredProjects = [...allProjects];
      currentPage = 1;
      renderProjects();
      return;
    }

    // Show skeleton during search
    showSearchSkeleton();

    try {
      const res  = await fetch('../backend/search_projects.php', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      const data = await res.json();
      if (data.status === 'success') {
        filteredProjects = data.data || [];
      } else {
        // Fallback: client-side filter on cached data
        const q = query.toLowerCase();
        filteredProjects = allProjects.filter(p =>
          (p.title||'').toLowerCase().includes(q) ||
          (p.description||'').toLowerCase().includes(q) ||
          (p.tags||'').toLowerCase().includes(q)
        );
      }
    } catch (_) {
      // Fallback: client-side filter
      const q = query.toLowerCase();
      filteredProjects = allProjects.filter(p =>
        (p.title||'').toLowerCase().includes(q) ||
        (p.description||'').toLowerCase().includes(q) ||
        (p.tags||'').toLowerCase().includes(q)
      );
    }

    currentPage = 1;
    renderProjects();
  }

  function showSearchSkeleton() {
    document.getElementById('projects-grid').innerHTML = `
      ${[1,2,3].map(()=>`
        <div class="skeleton-card">
          <div class="skeleton sk-line short"></div>
          <div class="skeleton sk-block"></div>
          <div class="skeleton sk-line long"></div>
          <div class="skeleton sk-line medium"></div>
        </div>
      `).join('')}
    `;
    document.getElementById('pagination').innerHTML = '';
  }

  /* ============================================================
     JOIN PROJECT
  ============================================================ */
  async function handleJoin(event, projectId, btn) {
    event.stopPropagation(); // Prevent card click
    btn.disabled = true;
    btn.textContent = '…';

    try {
      const res  = await fetch('../backend/join_project.php', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_id: projectId })
      });
      const data = await res.json();

      if (data.status === 'success') {
        btn.textContent = '✓ Joined';
        btn.classList.add('joined');
        btn.disabled = true;
        // Increment member count in DOM
        const countEl = document.getElementById(`member-count-${projectId}`);
        if (countEl) countEl.textContent = parseInt(countEl.textContent) + 1;
        showToast('You have joined the project!', 'success');
        // Update local data
        const proj = allProjects.find(p => p.id == projectId);
        if (proj) proj.collaborators = [...(proj.collaborators||[]), { email: currentUser.email }];
      } else {
        btn.textContent = 'Join Team';
        btn.disabled = false;
        showToast(data.message || 'Could not join project.', 'error');
      }
    } catch (err) {
      btn.textContent = 'Join Team';
      btn.disabled = false;
      showToast('Network error. Please try again.', 'error');
    }
  }

  /* ============================================================
     DETAILS MODAL
  ============================================================ */
  function openModal(projectId) {
    const p = allProjects.find(p => p.id == projectId);
    if (!p) return;

    document.getElementById('modal-title').textContent = p.title || 'Untitled Project';
    document.getElementById('modal-desc').textContent  = p.description || '';
    document.getElementById('modal-date').textContent  = p.created_at || p.date || 'Unknown';
    document.getElementById('modal-faculty').textContent = p.approved_by || p.faculty_name || 'N/A';

    // Tags
    const tags = (p.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    document.getElementById('modal-tags').innerHTML = tags.map((t,i) =>
      `<span class="tag-pill ${TAG_VARIANTS[i%4]}">${escapeHTML(t)}</span>`
    ).join('');

    // Collaborators
    const collabs = p.collaborators || [];
    const cl = document.getElementById('modal-collaborators');
    if (collabs.length === 0) {
      cl.innerHTML = '<li style="color:var(--muted);font-size:13px">No collaborators yet.</li>';
    } else {
      cl.innerHTML = collabs.map(c => {
        const name = c.name || c.email || 'Unknown';
        const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        return `<li class="collaborator-item"><div class="collaborator-avatar">${initials}</div>${escapeHTML(name)}</li>`;
      }).join('');
    }

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  // ESC to close modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ============================================================
     PROPOSAL SUBMISSION
  ============================================================ */
  async function handleProposalSubmit() {
    const title = document.getElementById('prop-title').value.trim();
    const desc  = document.getElementById('prop-desc').value.trim();
    const tags  = document.getElementById('prop-tags').value.trim();

    if (!title || !desc) {
      showToast('Please fill in the title and description.', 'error');
      return;
    }

    const btn = document.getElementById('prop-submit-btn');
    const sp  = document.getElementById('prop-spinner');
    const txt = document.getElementById('prop-btn-text');
    btn.disabled = true; sp.classList.add('show'); txt.textContent = 'Submitting…';

    try {
      const res  = await fetch('../backend/submit_project.php', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: desc, tags })
      });
      const data = await res.json();

      if (data.status === 'success') {
        showToast('Proposal submitted successfully!', 'success');
        document.getElementById('prop-title').value = '';
        document.getElementById('prop-desc').value  = '';
        document.getElementById('prop-tags').value  = '';
      } else {
        showToast(data.message || 'Submission failed.', 'error');
      }
    } catch (err) {
      showToast('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false; sp.classList.remove('show'); txt.textContent = 'Submit Proposal';
    }
  }

  /* ============================================================
     MODERATION QUEUE (Faculty)
  ============================================================ */
  async function loadPendingQueue() {
    try {
      const res  = await fetch('../backend/get_pending.php', { credentials: 'include' });
      const data = await res.json();
      renderPendingQueue(data.data || []);
    } catch (err) {
      showToast('Could not load moderation queue.', 'error');
      renderPendingQueue([]);
    }
  }

  function renderPendingQueue(items) {
    const list = document.getElementById('pending-list');
    if (!items || items.length === 0) {
      list.innerHTML = `
        <div class="all-clear">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>All clear — no pending proposals</span>
        </div>`;
      return;
    }

    list.innerHTML = items.map(item => `
      <div class="pending-item" id="pending-${item.id}">
        <div class="pending-title">${escapeHTML(item.title || 'Untitled')}</div>
        <div class="pending-meta">
          ${escapeHTML((item.description||'').slice(0, 90))}${(item.description||'').length > 90 ? '…' : ''}<br/>
          <strong style="color:var(--text)">By:</strong> ${escapeHTML(item.student_name || item.submitted_by || 'Unknown')}
        </div>
        <div class="pending-actions">
          <button class="btn-authorize" onclick="reviewProject('${item.id}', 'approve', this)">Authorize</button>
          <button class="btn-reject"    onclick="reviewProject('${item.id}', 'reject',  this)">Reject</button>
        </div>
      </div>
    `).join('');
  }

  async function reviewProject(projectId, action, btn) {
    // Disable both buttons in this item
    const itemEl = document.getElementById(`pending-${projectId}`);
    if (itemEl) itemEl.querySelectorAll('button').forEach(b => b.disabled = true);

    try {
      const res  = await fetch('../backend/review_project.php', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_id: projectId, action })
      });
      const data = await res.json();

      if (data.status === 'success') {
        showToast(action === 'approve' ? 'Project authorized!' : 'Project rejected.', action === 'approve' ? 'success' : 'info');
        // Animate out
        if (itemEl) {
          itemEl.classList.add('removing');
          setTimeout(() => {
            itemEl.remove();
            // Check if empty
            const list = document.getElementById('pending-list');
            if (list && list.children.length === 0) renderPendingQueue([]);
          }, 380);
        }
        // Reload main projects if approved
        if (action === 'approve') loadProjects();
      } else {
        showToast(data.message || 'Action failed.', 'error');
        if (itemEl) itemEl.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    } catch (err) {
      showToast('Network error. Please try again.', 'error');
      if (itemEl) itemEl.querySelectorAll('button').forEach(b => b.disabled = false);
    }
  }

  /* ============================================================
     EMPTY STATE HTML
  ============================================================ */
  function emptyStateHTML(heading, sub) {
    return `
      <div class="empty-state">
        <svg width="72" height="72" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="35" stroke="rgba(79,142,247,0.2)" stroke-width="2"/>
          <circle cx="50" cy="50" r="20" stroke="rgba(79,142,247,0.15)" stroke-width="2"/>
          <circle cx="50" cy="50" r="5" fill="rgba(79,142,247,0.3)"/>
          <line x1="15" y1="50" x2="30" y2="50" stroke="rgba(79,142,247,0.3)" stroke-width="2" stroke-linecap="round"/>
          <line x1="70" y1="50" x2="85" y2="50" stroke="rgba(79,142,247,0.3)" stroke-width="2" stroke-linecap="round"/>
          <line x1="50" y1="15" x2="50" y2="30" stroke="rgba(79,142,247,0.3)" stroke-width="2" stroke-linecap="round"/>
          <line x1="50" y1="70" x2="50" y2="85" stroke="rgba(79,142,247,0.3)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h3>${heading}</h3>
        <p>${sub}</p>
      </div>
    `;
  }

  /* ============================================================
     UTILITY — HTML escape
  ============================================================ */
  function escapeHTML(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ============================================================
     BOOT
  ============================================================ */
  init();
  </script>
